<script>
    function modalChange(project) {
        var title = ''
        var body = ''
        switch (project) {
            case 'ctrl-cloud':
                title = 'Ctrl-Cloud'
                body = `
                    <div class="embed-responsive embed-responsive-16by9">
                        <iframe class="embed-responsive-item" src="http://mtam2.github.io/Ctrl-Cloud/"></iframe>
                    </div><br>
                    <h3 class="text-center">
                        <a href="http://mtam2.github.io/Ctrl-Cloud/">External Link</a>
                    </h3>
                `
                break;
            case 'deep-blue':
                title = 'Deep Blue'
                body = `
                    <img src="img/DeepBlue.png" class="img-fluid">
                    <div class="text-center">
                        <a type="button" class="btn btn-primary" href="https://github.com/agonzalez2/DeepBlueGame">
                            <img src="img/GitHub-Mark-32px.png"> GitHub Repo
                        </a><br>
                        <a class='text-center' href="res/DeepBlue.jar">
                            <button type='button' class="btn btn-primary">Download DeepBlue.jar</button>
                        </a>
                    </div>
                `
                break;
            case 'gfm':
                title = 'Generic File Monitor'
                body = gfm
                break;
            case 'tjm':
                title = 'Track-It! Jira Integration'
                body = `
                    <a type="button" class="btn btn-primary btn-sm" href="https://github.com/mtam2/Generic-File-Monitor-Public">
                        <img src="img/GitHub-Mark-32px.png"> GitHub Repo
                    </a>
                `
                break;
            case 'hadoop':
                title = 'Hadoop Cluster Installation'
                body = hadoop
                break;
            case 'google':
                title = 'Google Album API'
                body = `
                    <p><a href="https://kunnas.com/google-photos-is-a-disaster/">Elias</a> is right, Google Photos is a developer's nightmare.
                        All I wanted to achieve was to transform my Raspberry Pi Zero into a Google Photos upload device so I could simply slot
                        an SD card from a DSLR and upload all the photos straight to a new album. After digging through old Google tutorials and
                        deprecated documents, Google Photos has no public API to create new albums anymore. The Picasa Web API only allows for
                        getting album and image data but not to post anything back. The code below was all I could salvage without getting
                        <code>GooglePhotosException: (400, 'Bad Request', 'XXXX is no longer supported')</code> It pulls all the public album
                        data from a specific Google user. Python 2.7 with https://github.com/google/gdata-python-client : <br>
                        <pre><code>
albums = gd_client.GetUserFeed(user="mtamdev")
for album in albums.entry:
    z = album
    print 'title: %s, number of photos: %s, id: %s, link: %s' % (album.title.text,
        album.numphotos.text, album.gphoto_id.text, album.GetHtmlLink())
                        </code></pre>

                    </p>
                `
                break;
        }
        $("#modal-title").html(title);
        $("#modal-body").html(body);
    }
